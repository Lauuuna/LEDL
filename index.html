<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Your List Name</title>

        <link rel="icon" href="list_icon.png" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@500;700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" type="text/css" href="css/reset.css" />
        <link rel="stylesheet" type="text/css" href="css/typography.css" />
        <link rel="stylesheet" type="text/css" href="css/main.css" />
        <link rel="stylesheet" type="text/css" href="css/pages/list.css" />
        <link
            rel="stylesheet"
            type="text/css"
            href="css/pages/leaderboard.css"
        />
        <link rel="stylesheet" type="text/css" href="css/pages/roulette.css" />
        <link rel="stylesheet" type="text/css" href="css/components/nav.css" />
        <link rel="stylesheet" type="text/css" href="css/components/btn.css" />
        <link
            rel="stylesheet"
            type="text/css"
            href="css/components/tabs.css"
        />
        <link rel="stylesheet" type="text/css" href="css/mobile.css" />
        <script src="https://unpkg.com/vue@3.2.31/dist/vue.global.js"></script>
        <script src="https://unpkg.com/vue-router@4.0.14/dist/vue-router.global.prod.js"></script>
        <script type="module" src="js/main.js"></script>
    </head>
    <body id="app">
        <header :class="{ dark: store.dark, 'menu-open': store.mobileMenu }">
            <div class="logo">
                <h2>{{ store.config.name || 'Sample List' }}</h2>
            </div>
            <nav class="nav">
                <div class="nav__tabs">
                    <router-link class="nav__tab" to="/">
                        <span class="type-label-lg">List</span>
                    </router-link>
                    <router-link class="nav__tab" to="/leaderboard">
                        <span class="type-label-lg">Leaderboard</span>
                    </router-link>
                    <router-link class="nav__tab" to="/roulette">
                        <span class="type-label-lg">Roulette</span>
                    </router-link>
                </div>
                <div class="nav__actions">
                    <button class="nav__icon" @click.prevent="store.toggleDark()">
                        <img
                            :src="store.dark ? 'assets/light.svg' : 'assets/dark.svg'"
                            alt=""
                        />
                    </button>
                    <a class="nav__icon" :href="store.config.discord || '#'">
                        <img src="assets/discord.svg" alt="Discord Logo" />
                    </a>
                    <a
                        v-if="store.config.submitRecord?.enabled !== false"
                        class="nav__cta type-label-lg"
                        :href="store.config.submitRecord?.link || '#'"
                        target="_blank"
                        >Submit Record</a
                    >
                </div>
            </nav>
            <div class="header-actions">
                <button class="nav__icon" @click.prevent="store.toggleDark()">
                    <img
                        :src="store.dark ? 'assets/light.svg' : 'assets/dark.svg'"
                        alt=""
                    />
                </button>
                <a class="nav__icon" :href="store.config.discord || '#'">
                    <img src="assets/discord.svg" alt="Discord Logo" />
                </a>
                <button class="hamburger" @click.prevent="store.toggleMobileMenu()">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
            <nav class="nav-mobile" :class="{ open: store.mobileMenu }">
                <div class="nav-mobile__tabs">
                    <router-link
                        class="nav-mobile__tab"
                        to="/"
                        @click="store.closeMobileMenu()"
                    >
                        <span class="type-label-lg">List</span>
                    </router-link>
                    <router-link
                        class="nav-mobile__tab"
                        to="/leaderboard"
                        @click="store.closeMobileMenu()"
                    >
                        <span class="type-label-lg">Leaderboard</span>
                    </router-link>
                    <router-link
                        class="nav-mobile__tab"
                        to="/roulette"
                        @click="store.closeMobileMenu()"
                    >
                        <span class="type-label-lg">Roulette</span>
                    </router-link>
                    <router-link
                        class="nav-mobile__tab"
                        to="/info"
                        @click="store.closeMobileMenu()"
                    >
                        <span class="type-label-lg">Info</span>
                    </router-link>
                </div>
                <a
                    v-if="store.config.submitRecord?.enabled !== false"
                    class="nav-mobile__cta type-label-lg"
                    :href="store.config.submitRecord?.link || '#'"
                    target="_blank"
                    @click="store.closeMobileMenu()"
                >Submit Record</a>
            </nav>
            <div
                class="overlay"
                v-show="store.mobileMenu"
                @click="store.closeMobileMenu()"
            ></div>
        </header>
        <router-view :class="{ dark: store.dark }"></router-view>
    </body>
</html>
